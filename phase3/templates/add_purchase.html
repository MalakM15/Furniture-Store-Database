{% extends "base.html" %}

{% block title %}Add Purchase - AMIN Furniture{% endblock %}

{% block content %}
<div class="page-header fade-in">
    <div>
        <h1>New Purchase</h1>
        <p>Create a supplier purchase order</p>
    </div>
    <a href="{{ url_for('purchases') }}" class="btn btn-secondary">
        <i data-lucide="arrow-left"></i>
        Back to Purchases
    </a>
</div>

<form method="POST">
    <div class="card fade-in" style="animation-delay: 0.1s;">
        <div class="card-header">
            <h3 class="card-title">Purchase Information</h3>
        </div>
        <div style="padding: 1.5rem;">
            <div class="grid-2">
                <div class="form-group">
                    <label class="form-label">Supplier *</label>
                    <select name="supplier_id" id="supplier_id" class="form-control" required>
                        <option value="">Select Supplier</option>
                        {% for supplier in suppliers %}
                            <option value="{{ supplier.SupplierID }}">{{ supplier.SupplierName }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Purchase Date *</label>
                    <input type="date" name="purchase_date" class="form-control" value="{{ today }}" required>
                </div>
            </div>
        </div>
    </div>

    <div class="card fade-in" style="animation-delay: 0.2s;">
        <div class="card-header">
            <h3 class="card-title">Purchase Items</h3>
            <button type="button" class="btn btn-secondary btn-sm" id="add-item">
                <i data-lucide="plus"></i>
                Add Item
            </button>
        </div>
        <div style="padding: 1.5rem;">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                        <th style="width: 65%;">Product *</th>
                        <th style="width: 20%;">Quantity *</th>
                        <th style="width: 15%;">Action</th>
                        </tr>
                    </thead>
                    <tbody id="items-body">
                    </tbody>
                </table>
            </div>
            <div style="margin-top: 1rem; display: flex; justify-content: flex-end; gap: 0.75rem;">
                <button type="submit" class="btn btn-primary">
                    <i data-lucide="save"></i>
                    Save Purchase
                </button>
            </div>
        </div>
    </div>
</form>

<template id="item-row-template">
    <tr>
        <td>
            <select name="product_id" class="form-control" required>
                <option value="">Select Product</option>
                {% for product in products %}
                <option value="{{ product.ProductID }}" data-supplier-id="{{ product.SupplierID }}">#{{ product.ProductID }} - {{ product.ProductName }}</option>
                {% endfor %}
            </select>
        </td>
        <td>
            <input type="number" name="quantity" class="form-control" min="1" step="1" required>
        </td>
        <td>
            <button type="button" class="btn btn-danger btn-sm remove-row">
                <i data-lucide="trash-2"></i>
                Remove
            </button>
        </td>
    </tr>
</template>
{% endblock %}

{% block extra_js %}
<script>
    function filterProductsBySupplier() {
        const supplierId = document.getElementById('supplier_id').value;
        document.querySelectorAll('select[name="product_id"]').forEach((select) => {
            const currentValue = select.value;
            let hasVisible = false;
            Array.from(select.options).forEach((option) => {
                if (!option.value) return;
                const optionSupplier = option.dataset.supplierId;
                const show = !supplierId || optionSupplier === supplierId;
                option.hidden = !show;
                option.disabled = !show;
                if (show) {
                    hasVisible = true;
                }
            });
            if (currentValue && select.options[select.selectedIndex].disabled) {
                select.value = '';
            }
            select.disabled = !supplierId || !hasVisible;
        });
    }
    
    function bindRemoveButtons() {
        document.querySelectorAll('.remove-row').forEach((btn) => {
            btn.addEventListener('click', (event) => {
                const row = event.currentTarget.closest('tr');
                if (row) {
                    row.remove();
                }
            });
        });
    }
    
    function addRow() {
        const template = document.getElementById('item-row-template');
        const tbody = document.getElementById('items-body');
        const row = template.content.firstElementChild.cloneNode(true);
        tbody.appendChild(row);
        bindRemoveButtons();
        filterProductsBySupplier();
        lucide.createIcons();
    }
    
    document.getElementById('add-item').addEventListener('click', addRow);
    document.getElementById('supplier_id').addEventListener('change', filterProductsBySupplier);
    addRow();
    filterProductsBySupplier();
    
    lucide.createIcons();
</script>
{% endblock %}
