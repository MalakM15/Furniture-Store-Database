{% extends "base.html" %}

{% block title %}Register - AMIN Furniture{% endblock %}

{% block content %}
<div style="max-width: 500px; margin: 4rem auto; padding: 0 2rem;">
    <div class="card fade-in">
        <div style="text-align: center; margin-bottom: 2rem;">
            <h1 style="font-family: 'Cormorant Garamond', serif; font-size: 2.5rem; color: var(--accent-gold); margin-bottom: 0.5rem;">Create Account</h1>
            <p style="color: var(--text-muted);">Join AMIN Furniture Store</p>
        </div>
        
        <form method="POST" action="{{ url_for('register') }}">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                    <label class="form-label">First Name *</label>
                    <input type="text" name="first_name" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Last Name *</label>
                    <input type="text" name="last_name" class="form-control" required>
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label">Email *</label>
                <input type="email" name="email" class="form-control" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">Phone Number</label>
                <input type="text" name="phone_number" class="form-control" placeholder="0599123456">
            </div>
            
            <div class="form-group">
                <label class="form-label">Address</label>
                <textarea name="address" class="form-control" rows="2" placeholder="Ramallah, Al-Bireh Street"></textarea>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                <i data-lucide="user-plus"></i>
                Create Account
            </button>
        </form>
        
        <div style="text-align: center; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border-color);">
            <p style="color: var(--text-muted); font-size: 0.875rem;">
                Already have an account?
                <a href="{{ url_for('login') }}" style="color: var(--accent-gold); text-decoration: none;">
                    Login
                </a>
            </p>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    lucide.createIcons();
</script>
{% endblock %}
